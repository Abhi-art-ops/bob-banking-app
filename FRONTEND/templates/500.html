{% extends "base.html" %}
{% block title %}Server Error - SecureBank{% endblock %}
{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height: calc(100vh - 80px);">
  <div class="text-center">
    <i class="bi bi-bug text-danger" style="font-size:4rem;"></i>
    <h1 class="display-4 fw-bold mt-3">500</h1>
    <h4 class="text-muted mb-4">Internal Server Error</h4>
    <p class="text-muted mb-4">Something went wrong on our end. Please try again in a moment.</p>
    <a href="{{ url_for('auth.login_get') }}" class="btn btn-dark btn-lg"><i class="bi bi-arrow-counterclockwise me-2"></i>Try Again</a>
  </div>
</div>
{% endblock %}
