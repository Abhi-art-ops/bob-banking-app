{% extends "base.html" %}
{% block title %}Login - SecureBank{% endblock %}
{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height: calc(100vh - 80px);">
  <div class="col-12 col-sm-9 col-md-6 col-lg-4">
    <div class="card rounded-3">
      <div class="card-header bg-dark text-white text-center py-3">
        <h4 class="mb-0"><i class="bi bi-shield-lock-fill me-2"></i>Customer Login</h4>
        <small class="text-secondary">SecureBank Online Banking</small>
      </div>
      <div class="card-body p-4">
        <form method="POST" action="{{ url_for('auth.login_post') }}" novalidate>
          <div class="mb-3">
            <label for="username" class="form-label fw-semibold"><i class="bi bi-person me-1"></i>Username</label>
            <input type="text" class="form-control form-control-lg" id="username" name="username" placeholder="Enter your username" autocomplete="username" required autofocus />
          </div>
          <div class="mb-4">
            <label for="password" class="form-label fw-semibold"><i class="bi bi-lock me-1"></i>Password</label>
            <input type="password" class="form-control form-control-lg" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" required />
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-dark btn-lg"><i class="bi bi-box-arrow-in-right me-2"></i>Login</button>
          </div>
        </form>
      </div>
      <div class="card-footer text-center text-muted py-3">
        <small><i class="bi bi-info-circle me-1"></i>Demo: <strong>john_doe</strong> / <strong>password123</strong></small>
      </div>
    </div>
  </div>
</div>
{% endblock %}
