{% extends "base.html" %}
{% block title %}Page Not Found - SecureBank{% endblock %}
{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height: calc(100vh - 80px);">
  <div class="text-center">
    <i class="bi bi-exclamation-circle text-secondary" style="font-size:4rem;"></i>
    <h1 class="display-4 fw-bold mt-3">404</h1>
    <h4 class="text-muted mb-4">Page Not Found</h4>
    <p class="text-muted mb-4">The page you're looking for doesn't exist or has been moved.</p>
    <a href="{{ url_for('auth.login_get') }}" class="btn btn-dark btn-lg"><i class="bi bi-house me-2"></i>Go to Login</a>
  </div>
</div>
{% endblock %}
